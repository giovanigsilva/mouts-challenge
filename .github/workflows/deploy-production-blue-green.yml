name: deploy-production-blue-green

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  blue-green:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: template/backend
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore Ambev.DeveloperEvaluation.sln
      - run: dotnet build Ambev.DeveloperEvaluation.sln --configuration Release --no-restore
      - run: dotnet test Ambev.DeveloperEvaluation.sln --configuration Release --no-build
      - run: dotnet ef migrations script --idempotent --project src/Ambev.DeveloperEvaluation.ORM --startup-project src/Ambev.DeveloperEvaluation.WebApi --output migration-script.sql
      - uses: actions/upload-artifact@v4
        with:
          name: production-idempotent-migration
          path: template/backend/migration-script.sql
      - run: dotnet publish src/Ambev.DeveloperEvaluation.WebApi/Ambev.DeveloperEvaluation.WebApi.csproj --configuration Release --output publish/webapi
      - run: dotnet publish src/Ambev.DeveloperEvaluation.Worker/Ambev.DeveloperEvaluation.Worker.csproj --configuration Release --output publish/worker
      - run: dotnet publish src/Ambev.DeveloperEvaluation.Functions/Ambev.DeveloperEvaluation.Functions.csproj --configuration Release --output publish/functions
      - run: echo "Blue-green production simulado. Configure OIDC, App Service slots e smoke URLs para deploy real."
