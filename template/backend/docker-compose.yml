services:
  frontend:
    container_name: developerstore_frontend
    image: ${DOCKER_REGISTRY-}developerstorefrontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_APP_NAME: ${VITE_APP_NAME:-DeveloperStore Frontend}
        VITE_APP_ENV: ${VITE_APP_ENV:-development}
    ports:
      - "5173:80"
    depends_on:
      - ambev.developerevaluation.webapi
    restart: unless-stopped

  ambev.developerevaluation.webapi:
    container_name: ambev_developer_evaluation_webapi
    image: ${DOCKER_REGISTRY-}ambevdeveloperevaluationwebapi
    build:
      context: .
      dockerfile: src/Ambev.DeveloperEvaluation.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=ambev.developerevaluation.database;Port=5432;Database=developer_evaluation;Username=developerstore_app;Password=DevOnly_Pg_9fR!42sL#2026_Strong
      - Jwt__SecretKey=DevOnly_JwtSecret_2026_pZ9!mQ4#vL8@rT2%DeveloperStore
      - Jwt__Issuer=DeveloperStore.Development
      - Jwt__Audience=DeveloperStore.Api
      - Vault__Enabled=true
      - Vault__Address=http://vault:8200
      - Vault__Token=dev-root-token
      - Vault__Mount=secret
      - Vault__Path=developerstore/development
      - Vault__TimeoutSeconds=5
      - Vault__FailFastInProduction=true
      - ConnectionStrings__Redis=redis:6379
      - Cache__Enabled=${CACHE_ENABLED:-false}
      - Cache__DefaultExpirationSeconds=300
      - Cache__SalesDetailExpirationSeconds=600
      - Cache__SalesListExpirationSeconds=120
      - Seq__Enabled=true
      - Seq__Url=http://seq:5341
      - Observability__EnableSeqFallback=true
      - Observability__EnableDatadog=true
      - Observability__MaskSensitiveData=true
      - DD_SERVICE=${DD_SERVICE:-developerstore-sales-api}
      - DD_ENV=${DD_ENV:-development}
      - DD_VERSION=${DD_VERSION:-1.0.0}
    labels:
      com.datadoghq.ad.logs: '[{"source":"csharp","service":"developerstore-sales-api"}]'
    ports:
      - "8080:8080"
    depends_on:
      ambev.developerevaluation.database:
        condition: service_healthy
      vault:
        condition: service_started
      seq:
        condition: service_started
    restart: unless-stopped

  ambev.developerevaluation.database:
    container_name: ambev_developer_evaluation_database
    image: postgres:13

    environment:
      POSTGRES_DB: developer_evaluation
      POSTGRES_USER: developerstore_app
      POSTGRES_PASSWORD: DevOnly_Pg_9fR!42sL#2026_Strong
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developerstore_app -d developer_evaluation"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  vault:
    container_name: developerstore-vault
    image: hashicorp/vault:1.16
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    restart: unless-stopped

  seq:
    container_name: developerstore_seq
    image: datalust/seq:2024.3
    environment:
      ACCEPT_EULA: "Y"
      SEQ_API_LISTENURIS: "http://0.0.0.0:5341"
    ports:
      - "5341:5341"
    volumes:
      - seq-data:/data
    restart: unless-stopped

  redis:
    container_name: developerstore_redis
    image: redis:7.4-alpine
    profiles:
      - enterprise
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  prometheus:
    container_name: developerstore_prometheus
    image: prom/prometheus:v2.55.1
    profiles:
      - enterprise
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - ambev.developerevaluation.webapi
    restart: unless-stopped

  grafana:
    container_name: developerstore_grafana
    image: grafana/grafana:11.3.1
    profiles:
      - enterprise
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: developerstore
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  postgres-exporter:
    container_name: developerstore_postgres_exporter
    image: prometheuscommunity/postgres-exporter:v0.16.0
    profiles:
      - enterprise
    environment:
      DATA_SOURCE_NAME: postgresql://developerstore_app:DevOnly_Pg_9fR!42sL%232026_Strong@ambev.developerevaluation.database:5432/developer_evaluation?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      ambev.developerevaluation.database:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    container_name: developerstore_redis_exporter
    image: oliver006/redis_exporter:v1.66.0
    profiles:
      - enterprise
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  k6:
    container_name: developerstore_k6
    image: grafana/k6:0.54.0
    profiles:
      - loadtest
    environment:
      BASE_URL: ${K6_BASE_URL:-http://ambev.developerevaluation.webapi:8080}
      TOKEN: ${K6_TOKEN:-}
      SALE_ID: ${K6_SALE_ID:-}
    volumes:
      - ./tests/load:/scripts:ro
    depends_on:
      - ambev.developerevaluation.webapi
    entrypoint: ["k6"]

  datadog-agent:
    container_name: developerstore_datadog_agent
    image: gcr.io/datadoghq/agent:7
    environment:
      DD_API_KEY: ${DD_API_KEY:-00000000000000000000000000000000}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:developerstore_datadog_agent name:developerstore_seq name:ambev_developer_evaluation_database"
      DD_SERVICE: ${DD_SERVICE:-developerstore-sales-api}
      DD_ENV: ${DD_ENV:-development}
      DD_VERSION: ${DD_VERSION:-1.0.0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    restart: unless-stopped

volumes:
  seq-data:
  redis-data:
  prometheus-data:
  grafana-data:
