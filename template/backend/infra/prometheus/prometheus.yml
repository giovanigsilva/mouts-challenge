global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: developerstore-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - ambev.developerevaluation.webapi:8080

  - job_name: developerstore-postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: developerstore-redis
    static_configs:
      - targets:
          - redis-exporter:9121
